stages:
  - check
  - build
  - deploy


black:
  image: joajfreitas/arch-python
  stage: check
  needs: []
  script:
    - pip install black
    - ./hooks/black

pylint:
  image: joajfreitas/arch-python
  stage: check
  needs: []
  script:
    - pip install -r requirements.txt
    - pip install pylint
    - ./hooks/pylint

install:
  image: joajfreitas/arch-python
  stage: build
  needs: []
  tags:
    - docker

  script:
    - python hooks/check_release_notes
    - python3 setup.py install
    - fcp --version

release:
  image: joajfreitas/arch-python
  stage: deploy
  only:
    - master

  script:
    - python hooks/check_release_notes
    - python setup.py sdist
    - pip install twine
    - twine upload -u joajfreitas -p $PYPI_PASSWORD dist/* 


pages:
  image: joajfreitas/arch-python
  stage: deploy
  script:
    - pip install sphinx
    - pip install sphinx_rtd_theme
    - pip install sphinxcontrib-programoutput
    - make html
    - cp -r build/html/* public
  artifacts:
    paths:
    - public/
    expire_in: 1 day
